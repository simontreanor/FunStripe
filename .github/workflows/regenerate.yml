name: Regenerate source files

on:
  workflow_dispatch:
    inputs:
      spec:
        description: 'OpenAPI spec file (relative to repo root). Blank = StripeApiVersion from Directory.Build.props'
        required: false
        default: ''
      version:
        description: 'Version stamped into generated code. Blank = FunStripeVersion from Directory.Build.props'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Run generator
        # Blank inputs fall back to the centralised defaults in Directory.Build.props,
        # so the generator can't be run with a stale hard-coded version/spec.
        run: |
          ARGS="--output src"
          if [ -n "${{ github.event.inputs.spec }}" ]; then ARGS="$ARGS --spec ${{ github.event.inputs.spec }}"; fi
          if [ -n "${{ github.event.inputs.version }}" ]; then ARGS="$ARGS --version ${{ github.event.inputs.version }}"; fi
          echo "dotnet run --project tools/FunStripe.Generator -- $ARGS"
          dotnet run --project tools/FunStripe.Generator -- $ARGS

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate source files from ${{ github.event.inputs.spec }}"
          title: "Regenerate source files"
          body: |
            Auto-generated by the **Regenerate source files** workflow.

            | Parameter | Value |
            |-----------|-------|
            | Spec | `${{ github.event.inputs.spec }}` |
            | Version | `${{ github.event.inputs.version }}` |
          branch: regenerate/source-files
          delete-branch: true
