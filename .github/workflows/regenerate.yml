name: Regenerate source files

on:
  workflow_dispatch:
    inputs:
      spec:
        description: 'OpenAPI spec file (relative to repo root)'
        required: false
        default: 'spec/stripe-openapi-2026-04-22.dahlia.json'
      version:
        description: 'Version string embedded in generated code'
        required: false
        default: '1.0.0'

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Run generator
        run: >
          dotnet run --project tools/FunStripe.Generator
          -- --spec ${{ github.event.inputs.spec }}
             --output src
             --version ${{ github.event.inputs.version }}

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate source files from ${{ github.event.inputs.spec }}"
          title: "Regenerate source files"
          body: |
            Auto-generated by the **Regenerate source files** workflow.

            | Parameter | Value |
            |-----------|-------|
            | Spec | `${{ github.event.inputs.spec }}` |
            | Version | `${{ github.event.inputs.version }}` |
          branch: regenerate/source-files
          delete-branch: true
