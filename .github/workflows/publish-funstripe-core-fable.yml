name: Publish FunStripe.Core.Fable to NuGet

on:
  push:
    tags:
      - 'v2-fable/*'
  workflow_dispatch:
    inputs:
      version:
        description: 'New FunStripe.Core.Fable version number (overrides tag)'
        required: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_FILE: src/FunStripe.Core/FunStripe.Core.Fable.fsproj

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v2-fable/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: dotnet build ${{ env.PROJECT_FILE }} -c Release

      - name: Pack
        run: dotnet pack ${{ env.PROJECT_FILE }} -c Release -p:Version=${{ steps.version.outputs.value }}

      - name: Publish NuGet package
        run: dotnet nuget push src/FunStripe.Core/bin/Release/FunStripe.Core.Fable.${{ steps.version.outputs.value }}.nupkg --api-key ${{ secrets.NUGET_KEY }} --source https://api.nuget.org/v3/index.json
