name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Generator smoke test
        # Runs the code generator end-to-end against the bundled spec so that any
        # crash in the generator (e.g. an unhandled schema shape) is caught here on
        # every PR, instead of only surfacing in the weekly "Check for new Stripe
        # OpenAPI spec" job. Output goes to a throwaway dir; we only assert it exits 0.
        run: |
          dotnet run --project tools/FunStripe.Generator \
            -- --spec spec/stripe-openapi-2026-04-22.dahlia.json \
               --output "${RUNNER_TEMP}/gen-smoke"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore /property:GenerateFullPaths=true /consoleloggerparameters:NoSummary

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=normal"
        env:
          STRIPE_TEST_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
