name: Check for new Stripe OpenAPI spec

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-spec:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get latest Stripe OpenAPI release
        id: stripe
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/stripe/openapi/releases/latest)
          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          SPEC_VERSION=$(echo "$RELEASE" | jq -r '.body' \
            | grep 'spec3\.sdk\.' | grep -v beta | grep -v private \
            | awk -F'|' '{print $3}' | tr -d ' ')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "spec_version=$SPEC_VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest stripe/openapi release: $TAG (spec version: $SPEC_VERSION)"

      - name: Check if spec version is already tracked
        id: check
        run: |
          SPEC_FILE="spec/stripe-openapi-${{ steps.stripe.outputs.spec_version }}.json"
          if [ -f "$SPEC_FILE" ]; then
            echo "Spec version ${{ steps.stripe.outputs.spec_version }} is already tracked — nothing to do."
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "New spec version detected: ${{ steps.stripe.outputs.spec_version }}"
            echo "new=true" >> "$GITHUB_OUTPUT"
            echo "spec_file=$SPEC_FILE" >> "$GITHUB_OUTPUT"
          fi

      - name: Download new spec
        if: steps.check.outputs.new == 'true'
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/stripe/openapi/${{ steps.stripe.outputs.tag }}/openapi/spec3.sdk.json" \
            -o "${{ steps.check.outputs.spec_file }}"
          echo "Downloaded ${{ steps.check.outputs.spec_file }}"

      - name: Bump version and update metadata
        if: steps.check.outputs.new == 'true'
        id: bump
        env:
          SPEC_VERSION: ${{ steps.stripe.outputs.spec_version }}
        run: |
          # A new Stripe API spec version => minor version bump (see Directory.Build.props).
          # Updates the single source of truth and prepends a CHANGELOG entry. Done in Python
          # to avoid sed/awk escaping pitfalls in unattended runs.
          python3 - <<'PY'
          import os, re, datetime, pathlib

          spec = os.environ["SPEC_VERSION"]
          props_path = pathlib.Path("Directory.Build.props")
          props = props_path.read_text()

          current = re.search(r"<FunStripeVersion>([^<]+)</FunStripeVersion>", props).group(1)
          old_spec = re.search(r"<StripeApiVersion>([^<]+)</StripeApiVersion>", props).group(1)
          major, minor, _patch = current.split(".")
          nxt = f"{major}.{int(minor) + 1}.0"

          props = re.sub(r"<FunStripeVersion>[^<]*</FunStripeVersion>",
                         f"<FunStripeVersion>{nxt}</FunStripeVersion>", props)
          props = re.sub(r"<StripeApiVersion>[^<]*</StripeApiVersion>",
                         f"<StripeApiVersion>{spec}</StripeApiVersion>", props)
          props_path.write_text(props)

          date = datetime.datetime.now(datetime.UTC).strftime("%Y-%m-%d")
          entry = (f"## [{nxt}] - {date}\n\n"
                   f"### Changed\n"
                   f"- Regenerated against Stripe OpenAPI spec `{spec}` (was `{old_spec}`)\n\n")
          changelog = pathlib.Path("CHANGELOG.md")
          text = changelog.read_text()
          idx = text.find("## [")  # insert above the most recent release heading
          changelog.write_text(text[:idx] + entry + text[idx:])

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"next={nxt}\n")
              out.write(f"old_spec={old_spec}\n")
          print(f"Bumped FunStripe {current} -> {nxt}; spec {old_spec} -> {spec}")
          PY

      - name: Setup .NET
        if: steps.check.outputs.new == 'true'
        uses: actions/setup-dotnet@v5

      - name: Run generator
        if: steps.check.outputs.new == 'true'
        run: |
          dotnet run --project tools/FunStripe.Generator \
            -- --spec ${{ steps.check.outputs.spec_file }} \
               --output src \
               --version ${{ steps.bump.outputs.next }}

      - name: Create pull request
        if: steps.check.outputs.new == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "release: ${{ steps.bump.outputs.next }} (Stripe OpenAPI spec ${{ steps.stripe.outputs.spec_version }})"
          title: "Release ${{ steps.bump.outputs.next }} — Stripe OpenAPI spec ${{ steps.stripe.outputs.spec_version }}"
          body: |
            A new Stripe OpenAPI spec version has been detected: **`${{ steps.stripe.outputs.spec_version }}`**
            (from [`stripe/openapi` ${{ steps.stripe.outputs.tag }}](https://github.com/stripe/openapi/releases/tag/${{ steps.stripe.outputs.tag }}))

            This PR was auto-generated by the **Check for new Stripe OpenAPI spec** workflow.
            A new spec version is treated as a **minor** release, so the version has already been
            bumped to **`${{ steps.bump.outputs.next }}`** (from `${{ steps.bump.outputs.old_spec }}`'s release):

            - `Directory.Build.props` — `FunStripeVersion` and `StripeApiVersion` updated
            - `src/` — regenerated and stamped with `${{ steps.bump.outputs.next }}`
            - `CHANGELOG.md` — entry added (please flesh out the notes)

            **Before merging, please:**
            - [ ] Review the generated changes in `src/`
            - [ ] Expand the `CHANGELOG.md` entry with anything notable in the new spec
            - [ ] Confirm the bump is right (use a **major** bump instead if the new spec is breaking)

            **After merging, push the release tags:**
            ```
            git tag v2/${{ steps.bump.outputs.next }}
            git tag v2-fable/${{ steps.bump.outputs.next }}
            git push origin v2/${{ steps.bump.outputs.next }} v2-fable/${{ steps.bump.outputs.next }}
            ```
          branch: update/stripe-openapi-${{ steps.stripe.outputs.spec_version }}
          delete-branch: true
